services:
  - type: web
    name: freellm
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: NVIDIA_NIM_API_KEY
        sync: false
      - key: FREELLM_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: freellm-bot
    runtime: docker
    dockerfilePath: ./apps/telegram-bot/Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 8080
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FREELLM_BASE_URL
        value: https://freellm-9b5b.onrender.com/v1
      - key: FREELLM_API_KEY
        sync: false
      - key: AGENT_MODEL
        value: free-smart
      - key: WORKSPACE_DIR
        value: /workspace

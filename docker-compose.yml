services:
  freellm:
    build: .
    container_name: freellm
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

  telegram-bot:
    build: apps/telegram-bot
    container_name: freellm-bot
    env_file:
      - .env
    environment:
      - FREELLM_BASE_URL=http://freellm:3000/v1
      - WORKSPACE_DIR=/workspace
    volumes:
      - .:/workspace
    depends_on:
      - freellm
    restart: unless-stopped
